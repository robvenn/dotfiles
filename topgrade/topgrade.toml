# Config path: %APPDATA%\topgrade.toml (Windows) | ~/.config/topgrade.toml (macOS)
# Topgrade ignores XDG_CONFIG_HOME on Windows — see .dotter/windows.toml for the override.

[misc]
# globals are managed by mise + the system package manager — disable topgrade's redundant native steps
disable = ["node", "go", "mise", "pnpm", "yarn", "bun", "bun_packages"]

[commands]
# scoped to ~ so project-local pins aren't bumped
"Mise upgrade (global)" = "cd ~ && mise upgrade"
